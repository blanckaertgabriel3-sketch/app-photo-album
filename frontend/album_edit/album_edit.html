<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Modifier un album</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="../common.css">
</head>

<body>
	<header>
		<h1>Modifier un album</h1>

		<ul id="menu">
			<li><a href="../home/home.html"><i class="fa-solid fa-house"></i></a></li>
			<li><a href="../album_photo_management/album_photo_management.html"><i class="fa-solid fa-circle-plus"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user-group"></i></a></li>
			<li><a href="#" id="logout_btn"><i class="fa-solid fa-right-from-bracket"></i></a></li>
		</ul>
	</header>

	<main>
		<div id="album_search_section">
			<h2>Rechercher l'album à modifier</h2>

			<label for="search_album_input">Titre de l'album :
				<input id="search_album_input" type="search" placeholder="Recherche album">
			</label>

			<ul id="album_search_result"></ul>
		</div>

		<div id="album_edit_section" style="display:none;">
			<h2>Modifier l'album : <span id="selected_album_title"></span></h2>

			<label for="title_input">Titre :
				<input id="title_input" type="text">
			</label>

			<label for="description_input">Description :
				<input id="description_input" type="text">
			</label>

			<label for="hashtag_input">Hashtag :
				<input id="hashtag_input" type="text">
				<button id="add_hashtag_btn">Ajouter un hashtag</button>
			</label>

			<ul id="hashtag_result"></ul>

			<label for="messages_allowed_btn">Autoriser les commentaires ?
				<button id="messages_allowed_btn">Non</button>
			</label>

			<label>Restriction :
				<span id="restriction_span"></span>
				<button id="restriction_public_btn">Public</button>
				<button id="restriction_private_btn">Privé</button>
				<button id="restriction_restrict_btn">Restreint</button>
			</label>

			<label for="friend_input_search">Inviter un collaborateur :
				<input id="friend_input_search" type="search">
			</label>

			<ul id="friend_search_result"></ul>

			<h4>Collaborateurs :</h4>

			<ul id="album_collaborators"></ul>

			<label for="search_photo">Ajouter une photo à l'album :
				<input type="search" id="search_photo" placeholder="Recherche photo">
			</label>

			<div id="photo_management"></div>

			<div id="selected_photos"></div>

			<button id="save_btn">Sauvegarder les modifications</button>
		</div>

		<div id="msg_box"></div>
	</main>

	<script src="../logout.js"></script>
	<script type="module" src="./album_edit.js"></script>
</body>

</html>
