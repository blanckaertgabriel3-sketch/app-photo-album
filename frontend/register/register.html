<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Créer un compte</title>
	<link rel="stylesheet" href="register.css">
	<link rel="stylesheet" href="../common.css">

</head>
<body>
	<header>
		<h1>Créer un compte</h1>
		<div id="form">
			<input id="register_form_name" type="text" placeholder="Prénom">
			<input id="register_form_password" type="text" placeholder="Mot de passe">
			<button id="register_form_validate_btn" type="submit">Valider</button>
			<button id="go_connection">Retour à la connexion</button>
		</div>
		<div id="register_form_error_box"></div>
	</header>
	<script src="register.js"></script>
</body>
</html>
