<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Accueil</title>
	<!-- fontawesome -->
	 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="home.css">
	<link rel="stylesheet" href="../common.css">
</head>
<body>
	<header>
		<h1>Accueil</h1>
		<ul id="menu">
			<li><a href="../home/home.html"><i class="fa-solid fa-house"></i></a></li>
			<li><a href="../album_photo_management/album_photo_management.html"><i class="fa-solid fa-circle-plus"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user-group"></i></a></li>
			<li><a href="#" id="logout_btn" ><i class="fa-solid fa-right-from-bracket"></i></a></li>
		</ul>
	</header>
	<main>
		<h3>Bonjour <span id="username_span"></span></h3>
		<div id="msg_box"></div>
		<div id="posts_container">
			<div class="post">
				<img src="../../rest/api/v1/uploads/1781598367_6a31089fd776a_9674.jpg" alt="Img utilisateur">
				<div class="title_date">
					<p class="title">titre_ex</p>
					<p> - </p>
					<p class="creation_date">0000-00-00</p>
				</div>
				<ul class="hashtags">
					<li>hashtag</li>
					<li>hashtag</li>
				</ul>
				<p class="description">Description ex</p>
				<button class="read_more">Lire la suite</button>
				<ul class="interactions_with_post">
					<li><a href="#"><i class="fa-solid fa-message"></i></a></li>
					<li><a href="#"><i class="fa-solid fa-heart"></i></a></li>
					<li><a href="#"><i class="fa-solid fa-share"></i></a></li>
				</ul>
			</div>
		</div>
		<h4>Pop-up de partage</h4>
		<button id="open_pop_up">Ouvrir la pop-up</button>
		<div id="modal">
			<p>Bonjour depuis la pop-up</p>
			<button id="close_pop_up">X</button>
		</div>
	</main>

	<script src="../logout.js"></script>
	<script type="module" src="home.js"></script>
</body>
</html>
