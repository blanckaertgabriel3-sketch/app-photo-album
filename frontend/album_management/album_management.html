<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gestion d'album</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

	<link rel="stylesheet" href="album_management.css">
	<link rel="stylesheet" href="../common.css">
</head>
<body>
	<header>
		<h1>Gestion album</h1>
		<ul id="menu">
			<li><a href="../home/home.html"><i class="fa-solid fa-house"></i></a></li>
			<li><a href="../album_photo_management/album_photo_management.html"><i class="fa-solid fa-circle-plus"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user"></i></a></li>
			<li><a href="#"><i class="fa-solid fa-user-group"></i></a></li>
			<li><a href="#" id="logout_btn" ><i class="fa-solid fa-right-from-bracket"></i></a></li>
		</ul>
	</header>
	<main>
		<div id="info_album">
			<label for="title_input">Titre : <input id="title_input" type="text"></label>
			<label for="description_input">Description : <input id="description_input" type="text"></label>
			<label for="hashtag_input">Hashtag : <input id="hashtag_input" type="text"> <button id="add_hashtag_btn">Ajouter le hashtag</button></label>
			<ul id="hashtag_result"></ul>
			<label for="messages_allowed">Autoriser les commentaires ? <button id="messages_allowed_btn">Non</button></label>
			<label> Définir la restriction : <button id="restriction_public_btn">Public</button><button id="restriction_private_btn">Privé</button><button id="restriction_restrict_btn">Restrinct</button></label>
			<label for="friend_input_search">Inviter : <input id="friend_input_search" type="search"></label>
			<label id="friend_search_result">"Résultat d'invitation"</label>
		</div>
		<div id="container_album_photos">
			<input type="search" id="search_photo" placeholder="Recherche photo">
			<div id="photo_management"></div>
			<div id="selected_photos"></div>
		</div>
		<button id="create_btn" type="submit">Créer l'album</button>
		<div id="msg_box"></div>
	</main>
	
	<script src="../logout.js"></script>
	<script type="module" src="./album_management.js"></script>
</body>
</html>
